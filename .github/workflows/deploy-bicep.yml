name: IaC - Deploy Bicep File to Azure

permissions:
  id-token: write
  contents: read
  packages: read

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep File IaC to Resource Group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create --name BicepDeployment \
              --resource-group rg-crudapp-dev-cin-01 \
              --template-file ./AzureInfrastructure/main.bicep